<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>리액트 추가해보기!</title>
    </head>
    <body>
      <div id="root"></div>
      <script
          src="https://unpkg.com/react@17/umd/react.development.js"
          crossorigin
      ></script>
      <script
          src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"
          crossorigin
      ></script>
      <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
      <script type="text/babel">

        //json 파일 정의
        // 아래 예시는 임시로 작성한 것!
        const json = [1, 2, 3, 4, 5, 6, 7, 8, 9]

        // 에어비엔비 예시
        function ImageSlide() {
          return (
            <img src="https://picsum.photos/200/300"/>
          )
        }


        function Title() {
          return (
            <h1>제주도의 명소</h1>
          )
        }


        function Info() {
          return (
            <p>100km 거리</p>
          )
        }


        function Price() {
          return(
            <p>100000</p>
          )
        }


        const app = (
          <div>
            {
            json.map(i => {
              return (
              <div>
                <ImageSlide/>
                <Title/>
                <Info/>
                <Price/>
              </div>
            )}
            )
          }
          </div>
        )

        
        const domContainer = document.querySelector("#root");
        ReactDOM.render(app, domContainer);
        </script>
    </body>
</html>
